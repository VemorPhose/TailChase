name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"

jobs:
  metadata:
    name: Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve TailChase version
        id: version
        run: |
          set -euo pipefail
          version="$(go run ./cmd/tailchase version)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "TailChase version: $version"

  module:
    name: Module Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - metadata

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Check go mod tidy
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  style:
    name: Format and Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - module

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          if [[ -n "$files" ]]; then
            echo "$files"
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Validate workflow YAML
        run: ruby -e 'require "yaml"; Dir[".github/workflows/*.{yml,yaml}"].each { |path| YAML.load_file(path) }'

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs:
      - module
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -count=1

      - name: Run artifact golden tests
        if: matrix.os == 'ubuntu-latest'
        run: go test ./tests -run TestGolden -count=1

      - name: Run no-network core flow
        if: matrix.os == 'ubuntu-latest'
        run: go test ./tests -run TestNoNetworkCoreFlow -count=1

      - name: Run usage and edge-case black-box tests
        if: matrix.os == 'ubuntu-latest'
        run: go test ./tests -run 'Test(InitDefaultGoal|PrepareCommand|CIWatch|CIWatcher)' -count=1

  race:
    name: Race Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run race tests
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate coverage
        run: |
          set -euo pipefail
          go test -coverpkg=./... -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tee coverage-summary.txt

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage-summary.txt

  smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - style
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -o dist/tailchase ./cmd/tailchase
          ./dist/tailchase version

      - name: Run local no-network core smoke test
        run: go test ./tests -run TestNoNetworkCoreFlow -count=1

      - name: Upload smoke binary
        uses: actions/upload-artifact@v4
        with:
          name: tailchase-smoke-linux-amd64
          path: dist/tailchase
